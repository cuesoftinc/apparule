# Local development stack for apparule.
# Usage: cp .env.example .env  &&  docker compose up --build
services:
  api-common:
    build: ./api/common
    image: cuesoft/apparule-api-common:latest
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-apparule-local}
      # For full Firebase functionality, mount a service-account JSON and set:
      # FIREBASE_CONFIG_PATH: /run/secrets/firebase-service-account.json
    restart: unless-stopped

  api-measure:
    build: ./api/measure
    image: cuesoft/apparule-api-measure:latest
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
    restart: unless-stopped

  web:
    image: cuesoft/apparule-web:latest
    build:
      # Repo-root context: web/ plus docs/api/openapi.yaml (the OpenAPI
      # document prebuild embeds for /docs/api); pruned by
      # web/Dockerfile.dockerignore.
      context: .
      dockerfile: web/Dockerfile
      # NEXT_PUBLIC_* are inlined into the standalone build, so pass them here.
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      api-common:
        condition: service_healthy
    restart: unless-stopped
