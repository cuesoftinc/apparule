# Static analysis per mobile-implementation.md §8 / the standards-research
# ledger: very_good_analysis + riverpod_lint, strict flags, generated +
# quarantined code excluded. CI runs `flutter analyze --fatal-infos` over
# this scope — riverpod_lint 3.x is a native analyzer plugin
# (analysis_server_plugin), so its diagnostics surface there too; the
# ledger's custom_lint pairing is retired upstream.
include: package:very_good_analysis/analysis_options.yaml

plugins:
  riverpod_lint: ^3.1.4

analyzer:
  errors:
    # The silent-failure class (interaction audit CLASS 4): a dropped
    # future IS a dropped failure path on device — fakes never throw, so
    # these only surface live. Error severity; deliberate fire-and-forget
    # sites say so with an explicit `unawaited()`.
    unawaited_futures: error
    discarded_futures: error
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    # Build products (incl. iOS SwiftPM checkouts, which carry their own
    # Dart sources) are never analysis targets.
    - build/**
    # Generated code is reviewed as diffs, not linted as source.
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - lib/l10n/generated/**
    - lib/firebase_options*.dart

linter:
  rules:
    # Ratified deviation (standards-research ledger): docs-on-everything is
    # noise at this stage; doc comments are still written where they earn it.
    public_member_api_docs: false
    # Repository interfaces are contractually abstract with *Remote/*Fake
    # implementations (mobile-implementation.md §6) and grow with their
    # feature — a one-method interface is the seed, not a typedef candidate.
    one_member_abstracts: false
