name: apparule
description: Apparule mobile app — AI-assisted body measurements and custom fashion orders.
publish_to: 'none'

# Version stamp x.y.z+build — humans own x.y.z, CI stamps the build number
# from GITHUB_RUN_NUMBER (mobile-implementation.md §2).
version: 1.0.0+1

environment:
  sdk: ^3.12.0
  flutter: 3.44.7 # mirrored from .fvmrc — the single source of truth (mobile-implementation.md §2)

# The ratified dependency set (standards-research ledger, verified pub.dev
# 2026-07-21). The auth cutover wired firebase_core/firebase_auth/
# google_sign_in (§9); the per-flavor `flutterfire configure` output
# (firebase_options.dart for prod, firebase_options_dev.dart) is pending
# `firebase login --reauth`.
dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.10.0
  firebase_auth: ^6.5.6
  firebase_core: ^4.12.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.2.0
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  google_sign_in: ^7.2.0
  # Ledger says ^0.20.3, but flutter_localizations (SDK 3.44.7) pins intl
  # 0.20.2 exactly — ^0.20.2 is the widest range the SDK admits.
  intl: ^0.20.2
  json_annotation: ^4.9.0
  riverpod_annotation: ^4.0.3
  shared_preferences: ^2.5.5
  # Pin-ledger addition (auth cutover): C1's legal links open the
  # canonical Cuesoft policies in the system browser (flows/auth.md §5).
  url_launcher: ^6.3.2

dev_dependencies:
  alchemist: ^0.14.0
  # Ledger pins 2.15.2, but that floor requires analyzer >=13.3 while
  # riverpod_generator 4.0.4 (latest) caps at ^12 — the solver settles on
  # the newest build_runner that co-resolves.
  build_runner: ^2.14.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8
  flutter_test:
    sdk: flutter
  # Resolves to 3.2.6-dev.1 (locked): stable 3.2.5 caps analyzer at <11
  # while riverpod_generator 4.0.4 needs ^12 — the dev release is freezed's
  # analyzer-12 compatibility build and the only co-resolvable version.
  freezed: ^3.2.5
  go_router_builder: ^4.3.1
  json_serializable: ^6.14.0
  mocktail: ^1.0.5
  patrol: ^4.7.1
  riverpod_generator: ^4.0.4
  very_good_analysis: ^10.3.0

# riverpod_lint 3.x is a NATIVE analyzer plugin (analysis_server_plugin) —
# it is installed via the top-level `plugins:` section of
# analysis_options.yaml, not as a pubspec dependency, and its diagnostics
# surface directly in `flutter analyze`. The ledger's custom_lint pairing
# is retired upstream (custom_lint still caps analyzer at ^8 and cannot
# co-resolve with the modern codegen stack).

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 24 # ratified Android floor (decisions.md M-4)

flutter:
  generate: true
  # `flutter run` picks dev when no --flavor is passed (ledger item 10).
  default-flavor: dev
  uses-material-design: true

  assets:
    - assets/images/

  # Inter is bundled, never fetched at runtime (mobile-implementation.md §7).
  # Weights per design.md §2: 400 / 600 / 700. License: assets/fonts/OFL.txt.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
