version: 2
updates:
  - package-ecosystem: gomod
    directory: /api/common
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /api/measure
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns: ["*"]
    ignore:
      # eslint 10 / typescript 7 crash eslint-config-next's typescript-eslint
      # toolchain (TypeError reading 'Cjs'); revisit when Next.js supports them.
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
      # @types/node tracks the runtime major (Node 24 in .nvmrc/Dockerfile).
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: pub
    directory: /mobile/flutter
    schedule:
      interval: weekly
