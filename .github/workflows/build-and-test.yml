# CI — build & test on every push/PR (X-6: merge-to-main never deploys;
# release.yml is tag-gated and lands separately).
name: build-and-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web · lint + typecheck + unit + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & integration tests
        run: npm test

      - name: Build (TEST_MODE)
        run: npm run build
        env:
          NEXT_PUBLIC_TEST_MODE: "1"

  web-e2e:
    name: web · Playwright (TEST_MODE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (TEST_MODE)
        run: npm run build
        env:
          NEXT_PUBLIC_TEST_MODE: "1"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright, TEST_MODE)
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_TEST_MODE: "1"
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7

  mobile:
    name: mobile · format + codegen + analyze + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter (version pinned by .fvmrc)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: mobile/flutter/.fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Generated code sits outside the format gate, mirroring the
      # analysis excludes.
      - name: Format check
        run: |
          find lib test test_goldens integration_test tool -name '*.dart' \
            -not -path 'lib/l10n/generated/*' \
            -not -name '*.g.dart' \
            -not -name '*.freezed.dart' \
            -print0 | xargs -0 dart format --set-exit-if-changed

      # Committed codegen (.g.dart/.freezed.dart + the token classes) must
      # match the builders' output exactly — generated code is reviewed like
      # any other diff, never silently regenerated (§6/§8).
      - name: Codegen-fresh check
        run: |
          dart run build_runner build
          dart run tool/gen_tokens.dart
          git diff --exit-code

      # The full §8 static gate: very_good_analysis strictness at
      # --fatal-infos; riverpod_lint rides along as a native analyzer
      # plugin (analysis_options `plugins:`), so its diagnostics land here
      # too. The coverage gate (very_good_coverage) joins with the feature
      # waves, once there is non-placeholder logic to hold a floor against.
      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

      # Golden gate (mobile-implementation.md §7/§8): every core/ui module's
      # committed CI goldens must still match. Alchemist's CI variant blocks
      # text, so the images compare byte-identically on any host.
      - name: Golden tests
        run: flutter test test_goldens

  mobile-ios:
    name: mobile · iOS simulator build (dev flavor)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile/flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter (version pinned by .fvmrc)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: mobile/flutter/.fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # The iOS lane the live-simulator defects slipped past: an unsigned
      # dev-flavor simulator build proves the Xcode flavor wiring (dev/prod
      # schemes + per-flavor configurations), the SwiftPM graph at the iOS 15
      # floor, and that the flavored assets/seed/ entries bundle — a
      # flavorless build ships EMPTY fakes (mobile-implementation.md §2).
      - name: Build iOS (simulator, no signing)
        run: flutter build ios --simulator --debug --flavor dev -t lib/main_dev.dart

      - name: Assert seed assets bundled
        run: |
          seeds="build/ios/iphonesimulator/Runner.app/Frameworks/App.framework/flutter_assets/assets/seed/dev"
          test -f "$seeds/posts.json" || { echo "::error::dev seed JSONs missing from the .app bundle"; exit 1; }
